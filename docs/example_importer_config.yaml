---
# Example ImporterConfig for the GENIE importer.
# See implementing_import_workflow.md for full field documentation.

dag_id: import_genie_clickhouse_dag
description: Imports GENIE study to ClickHouse database
importer: genie-clickhouse
tags:
  - genie-clickhouse

schedule_interval: "0 2 * * *"  # nightly at 2am; omit for manual-trigger only

# Pool name for limiting concurrent DAG runs. Omit if no concurrency control needed.
pool: genie_import_pool

# Source repositories this importer is authorized to pull from.
# Replaces the per-importer section in importer-data-source-manager-config.yaml.
source_repositories:
  - genie

# Named image aliases. Tasks reference these by name in their overrides.
images:
  default: cbioportal/cmo-pipelines:latest
  jre:     cbioportal/cmo-pipelines-jre:latest

# Airflow UI parameters — exposed as inputs when triggering the DAG manually.
params:
  data_repos:
    type: array
    default: [genie]
    description: Data repositories to pull from and clean up.

# Task definitions. Each entry is a task name. Omitting a field means "use the default".
tasks:

  verify_cluster_state:
    run_on_airflow_server: true  # touches cluster state — skip the pod

  verify_import_not_in_progress: {}  # queries ClickHouse to confirm state != running

  set_import_running: {}

  wipe_standby_database: {}

  clone_live_database_into_standby: {}

  fetch_studies_from_s3: {}

  validate_studies: {}

  import_into_standby_database:
    image: jre    # needs a JRE; references images.jre above
    cpu: "4"
    memory: 16Gi

  check_referential_integrity: {}

  check_foreign_key_integrity: {}

  transfer_deployment_color:
    run_on_airflow_server: true  # touches cluster state — skip the pod

  set_import_complete: {}

  send_slack_notifications: {}  # TriggerRule.ALL_DONE — excluded from on_execute_callback

  cleanup_data: {}              # TriggerRule.ALL_DONE — excluded from on_execute_callback

# DAG topology, expressed as dependency edges using >> notation.
# Lists on either side of >> indicate a fan-out or fan-in.
dependencies:
  - "verify_cluster_state >> verify_import_not_in_progress"
  - "verify_import_not_in_progress >> set_import_running"
  - "set_import_running >> [wipe_standby_database, fetch_studies_from_s3]"
  - "wipe_standby_database >> clone_live_database_into_standby"
  - "[clone_live_database_into_standby, fetch_studies_from_s3] >> validate_studies"
  - "validate_studies >> import_into_standby_database"
  - "import_into_standby_database >> [check_referential_integrity, check_foreign_key_integrity]"
  - "[check_referential_integrity, check_foreign_key_integrity] >> transfer_deployment_color"
  - "transfer_deployment_color >> set_import_complete"
  - "set_import_complete >> [send_slack_notifications, cleanup_data]"
